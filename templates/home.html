{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <h1 class="display-4">Welcome to Flask Notes App</h1>
        <p class="lead">A simple note-taking application built with Flask</p>
        {% if current_user.is_authenticated %}
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg mt-4">Go to My Notes</a>
        {% else %}
        <div>
            <a href="{{ url_for('login') }}" class="btn btn-outline-primary me-2">Login</a>
            <a href="{{ url_for('register') }}" class="btn btn-primary">Register</a>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
